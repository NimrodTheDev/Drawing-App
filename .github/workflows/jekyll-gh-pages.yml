name: Deploy Leptos App

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown

      # Node (ONLY for Tailwind binary availability)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # IMPORTANT: install Tailwind v4 CLI so Trunk uses it
      - name: Install dependencies
        run: npm install

      # Trunk install
      - name: Install Trunk
        run: cargo install trunk

      # Build EVERYTHING with Trunk (Rust + Tailwind v4)
      - name: Build with Trunk
        run: trunk build --release --public-url /Drawing-App/

      # Upload Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4