name: Deploy Leptos App

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------
      # Rust setup
      # -------------------------
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add WASM target
        run: rustup target add wasm32-unknown-unknown

      # -------------------------
      # Node setup (Tailwind v4)
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node deps
        run: npm install

      # -------------------------
      # Tailwind v4 build (IMPORTANT)
      # -------------------------
      - name: Build CSS (Tailwind v4)
        run: npm run build:css

      # -------------------------
      # Trunk setup
      # -------------------------
      - name: Install Trunk
        run: cargo install trunk

      - name: Build WASM with Trunk
        run: trunk build --release --public-url /Drawing-App/

      # -------------------------
      # Upload to Pages
      # -------------------------
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4